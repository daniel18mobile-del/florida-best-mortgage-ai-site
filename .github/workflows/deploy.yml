name: Build and deploy

on:
  push:
    branches:
      - main
      - feature/ai-editable-site
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to Hostinger after validation
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and validate SEO
        run: npm run validate:seo

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: >
      (github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy == 'true')) &&
      vars.HOSTINGER_DEPLOY_ENABLED == 'true'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Add known host
        run: ssh-keyscan -p "${{ secrets.HOSTINGER_PORT }}" "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy dist to Hostinger
        run: |
          rsync -az --delete -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" dist/ "${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_TARGET_DIR }}/"

